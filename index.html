<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#f6f6f6;
}

/* inactive button */

.neu-button{
border-radius:49px;
background:#f2f2f2;
color:#9c9c9c;
box-shadow: inset 2px 2px 4px rgba(0,0,0,0.12);
transition: all .25s ease;
}

/* active button */

.neu-active{
border-radius:49px;
background:#f5f5f5;
color:#000;

box-shadow:
0 8px 18px rgba(0,0,0,0.25),
0 25px 60px rgba(0,0,0,0.18);

transition: all .25s ease;
}

.neu-active:active{
transform:translateY(1px);
}

.input-style{
border-radius:54px;
background:#fff;
box-shadow:
inset 0 4px 5px rgba(0,0,0,0.2),
0 4px 5px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="flex flex-col h-screen bg-[#f6f6f6] pt-[16px]">

<div class="px-[30px] mt-6">

<div class="text-[#646464] text-base opacity-80 mb-4">
Способ оплаты
</div>

<div class="flex gap-[22px]">

<button id="russian"
class="bank-btn neu-active w-[155px] h-[84px] flex items-center justify-center text-sm font-medium text-center leading-[1.2]">
Российский<br>банк
</button>

<button id="foreign"
class="bank-btn neu-button w-[155px] h-[84px] flex items-center justify-center text-sm font-medium text-center leading-[1.2]">
Зарубежный<br>банк
</button>

</div>

</div>

<div class="px-[30px] mt-6">

<div class="text-[#646464] text-base opacity-80 mb-3">
Ваш E-mail для отправки чека
</div>

<input id="email" type="email" class="w-full h-[30px] px-4 input-style"/>

</div>

<div class="flex items-center px-[30px] mt-6 gap-4">

<button onclick="nextStep()" class="flex items-center justify-center px-6 py-2 bg-[#1f1f1f] text-white text-[26px] rounded-[40px] shadow-lg">
далее
</button>

<div class="flex-1 h-[2px] bg-gray-300"></div>

</div>

</div>

<script>

let selectedBank = "russian"

const buttons = document.querySelectorAll(".bank-btn")

buttons.forEach(btn => {

btn.addEventListener("click", () => {

buttons.forEach(b=>{
b.classList.remove("neu-active")
b.classList.add("neu-button")
})

btn.classList.add("neu-active")
btn.classList.remove("neu-button")

selectedBank = btn.id

})

})

function nextStep(){

const email=document.getElementById("email").value

Telegram.WebApp.sendData(JSON.stringify({
email:email,
bank:selectedBank
}))

}

Telegram.WebApp.ready()
Telegram.WebApp.expand()

</script>

</body>
</html>
