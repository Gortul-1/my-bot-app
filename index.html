<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family: Inter, sans-serif;
background:#0f1113;
color:white;
}

.top-steps{
background:#d9d9d9;
color:#000;
font-size:28px;
display:flex;
justify-content:center;
align-items:center;
gap:25px;
height:60px;
font-weight:500;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
padding-top:60px;
}

.title{
font-size:64px;
font-weight:500;
margin-bottom:60px;
}

.input-label{
width:80%;
max-width:320px;
font-size:18px;
margin-bottom:8px;
color:#d1d1d1;
}

.input-field{
width:80%;
max-width:320px;
height:46px;
border-radius:30px;
background:#6b6b6b;
border:none;
padding-left:20px;
color:white;
outline:none;
}

.pay-btn{
margin-top:180px;
background:#6b6b6b;
color:white;
border:none;
padding:16px 40px;
border-radius:40px;
font-size:24px;
cursor:pointer;
transition:all .15s ease;
}

.pay-btn:active{
transform:scale(.92);
opacity:.8;
}

</style>
</head>

<body>

<div class="top-steps">
<span>1</span>
<span>→</span>
<span>2</span>
<span>→</span>
<span>3</span>
</div>

<div class="container">

<div class="title">ОПлата</div>

<div class="input-label">введите почту</div>

<input class="input-field" type="email" placeholder="">

<button id="payButton" class="pay-btn">
оплата
</button>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

const btn = document.getElementById("payButton");

btn.addEventListener("click",()=>{

if(tg.HapticFeedback){
tg.HapticFeedback.impactOccurred("medium");
}

tg.openLink("https://google.com");

});

</script>

</body>
</html>
