<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #f6f6f6;
        }

        /* progress bar */
        .progress-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15), inset 0 1px 2px rgba(0,0,0,0.12);
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .progress-check {
            width: 10px;
            height: 6px;
            border-left: 2px solid #2b2b2b;
            border-bottom: 2px solid #2b2b2b;
            transform: rotate(-45deg);
            margin-top: -2px;
        }

        .progress-line {
            flex: 1;
            height: 2px;
            background: #dcdcdc;
            margin-top: 14px; /* центровка по высоте кружка */
            /* Увеличенный нахлест, чтобы соединение было бесшовным */
            margin-left: -14px; 
            margin-right: -14px;
            z-index: 1;
        }

        .progress-line-active {
            background: #bdbdbd;
        }

        /* bank buttons */
        .neu-button {
            border-radius: 49px;
            background: linear-gradient(99deg, #f7f7f7 0%, #f2f2f2 100%);
            box-shadow: inset 0px 4px 4px rgba(0,0,0,0.18), 0px 3px 6px rgba(0,0,0,0.08);
        }

        .neu-active {
            border-radius: 49px;
            background: linear-gradient(270deg, #928e8e 0%, #000 100%);
            box-shadow: 0 8px 14px rgba(0,0,0,0.18), 0 2px 4px rgba(0,0,0,0.12), inset 0 1px 2px rgba(255,255,255,0.15);
        }

        /* input */
        .input-style {
            border-radius: 54px;
            background: #fff;
            box-shadow: inset 0px 4.9px 4.9px rgba(0,0,0,0.22), 0px 4.9px 4.9px rgba(0,0,0,0.10);
            outline: none;
        }
    </style>
</head>

<body>

<div class="flex flex-col h-screen bg-[#f6f6f6] pt-[16px]">

    <!-- progress -->
    <div class="px-8 mb-6">
        <div class="flex items-start justify-between">
            
            <!-- Шаг 1 -->
            <div class="flex flex-col items-center w-16">
                <div class="progress-circle">
                    <div class="progress-check"></div>
                </div>
                <div class="text-black text-xs mt-2 text-center">Выбор</div>
            </div>

            <!-- Линия 1 (Активная) -->
            <div class="progress-line progress-line-active"></div>

            <!-- Шаг 2 -->
            <div class="flex flex-col items-center w-16">
                <div class="progress-circle">
                    <div class="progress-check opacity-30"></div>
                </div>
                <div class="text-gray-400 text-xs mt-2 text-center">Данные</div>
            </div>

            <!-- Линия 2 (Серая) -->
            <div class="progress-line"></div>

            <!-- Шаг 3 -->
            <div class="flex flex-col items-center w-16">
                <div class="progress-circle">
                    <div class="progress-check opacity-30"></div>
                </div>
                <div class="text-gray-400 text-xs mt-2 text-center">Оплата</div>
            </div>

        </div>
    </div>

    <!-- товар -->
    <div class="flex flex-col px-[30px]">
        <div class="text-[#646464] text-base opacity-80 mb-2">Товар:</div>
        <div class="text-[24px] font-semibold text-black leading-[1.2] mb-4">
            Доступ в закрытый<br>канал “Время бояться”
        </div>

        <div class="flex items-center gap-3 bg-white rounded-[20px] p-3 shadow">
            <div class="w-[44px] h-[44px] rounded-full bg-red-800 flex-shrink-0"></div>
            <div class="flex flex-col text-sm">
                <div class="font-medium">Мета катакомбы</div>
                <div class="text-[#8d8d8d] text-xs">Название канала изменено на "Мета катакомбы"</div>
            </div>
        </div>
    </div>

    <!-- способ оплаты -->
    <div class="px-[30px] mt-6">
        <div class="text-[#646464] text-base opacity-80 mb-4">Способ оплаты</div>
        <div class="flex gap-[22px]">
            <button id="russian" onclick="selectBank('russian')" class="relative w-[155px] h-[84px] neu-active flex items-center justify-center">
                <div class="absolute w-[125px] h-[60px] flex items-center justify-center rounded-[75px] bg-gradient-to-r from-[#f7f7f7] to-[#f2f2f2]">
                    <div class="text-[#353535] text-sm text-center leading-[1.2] font-medium">Российский<br>банк</div>
                </div>
            </button>
            <button id="foreign" onclick="selectBank('foreign')" class="relative w-[155px] h-[84px] neu-button flex items-center justify-center">
                <div class="text-[#bab8b8] text-sm text-center leading-[1.2] font-medium">Зарубежный<br>банк</div>
            </button>
        </div>
    </div>

    <!-- email -->
    <div class="px-[30px] mt-6">
        <div class="text-[#646464] text-base opacity-80 mb-3">Ваш E-mail для отправки чека</div>
        <input id="email" type="email" class="w-full h-[36px] px-4 input-style" />
    </div>

    <!-- цена -->
    <div class="px-[30px] mt-6">
        <div class="text-[#646464] text-[18px]">к оплате</div>
        <div class="text-[30px] font-bold text-[#181818]">1200 р</div>
    </div>

    <!-- кнопка -->
    <div class="flex items-center px-[30px] mt-6 gap-4">
        <button onclick="nextStep()" class="flex items-center justify-center px-6 py-2 bg-[#1f1f1f] text-white text-[26px] rounded-[40px] shadow-lg">далее</button>
        <div class="flex-1 h-[2px] bg-gray-300"></div>
    </div>

</div>

<script>
    let selectedBank = "russian"

    function selectBank(bank) {
        selectedBank = bank
        const russian = document.getElementById("russian")
        const foreign = document.getElementById("foreign")
        
        const activeTpl = (text) => `<div class="absolute w-[125px] h-[60px] flex items-center justify-center rounded-[75px] bg-gradient-to-r from-[#f7f7f7] to-[#f2f2f2]"><div class="text-[#353535] text-sm text-center leading-[1.2] font-medium">${text}</div></div>`;
        const inactiveTpl = (text) => `<div class="text-[#bab8b8] text-sm text-center leading-[1.2] font-medium">${text}</div>`;

        if (bank === "russian") {
            russian.className = "relative w-[155px] h-[84px] neu-active flex items-center justify-center";
            russian.innerHTML = activeTpl("Российский<br>банк");
            foreign.className = "relative w-[155px] h-[84px] neu-button flex items-center justify-center";
            foreign.innerHTML = inactiveTpl("Зарубежный<br>банк");
        } else {
            foreign.className = "relative w-[155px] h-[84px] neu-active flex items-center justify-center";
            foreign.innerHTML = activeTpl("Зарубежный<br>банк");
            russian.className = "relative w-[155px] h-[84px] neu-button flex items-center justify-center";
            russian.innerHTML = inactiveTpl("Российский<br>банк");
        }
    }

    function nextStep() {
        const email = document.getElementById("email").value
        Telegram.WebApp.sendData(JSON.stringify({
            email: email,
            bank: selectedBank
        }))
    }

    Telegram.WebApp.ready()
    Telegram.WebApp.expand()
</script>

</body>
</html>
