<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini App</title>
    <!-- ИСПРАВЛЕНО: Правильная ссылка на библиотеку Telegram WebApp -->
    <script src="https://telegram.org"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --button-bg: #C8C8C8; 
            --button-text: #000000;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: screen;
            font-family: sans-serif;
        }

        .custom-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: var(--button-bg);
            color: var(--button-text);
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease; /* Плавность анимации */
        }

        /* АНИМАЦИЯ НАЖАТИЯ: Кнопка визуально уменьшается при клике */
        .custom-button:active {
            transform: scale(0.92);
            opacity: 0.9;
        }

        .play-icon {
            margin-right: 8px;
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <main class="flex flex-col justify-center items-center px-5 py-10 w-full">
      <section class="flex flex-col gap-6 items-center w-full max-w-[390px]">
        
        <!-- КНОПКА 1: НАПИЛЬНИК (Ведет в Google) -->
        <button id="napilnik-btn" class="custom-button max-w-[260px] h-[72px] rounded-[36px]">
          НАПИЛЬНИК
        </button>

        <!-- КНОПКА 2: БОЛТИК (Ведет в Yandex) -->
        <button id="boltik-btn" class="custom-button max-w-[180px] h-16 rounded-[32px]">
          БОЛТИК
        </button>

        <button class="custom-button max-w-[250px] h-[72px] rounded-[36px]">
          НЕКОТОРЫЙ
        </button>

        <button class="custom-button max-w-[230px] h-[68px] rounded-[34px]">
          <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          РИСКУЮ
        </button>

      </section>
    </main>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Функция для настройки кнопки (Вибрация + Ссылка)
        function activateButton(id, url) {
            const btn = document.getElementById(id);
            if (!btn) return;

            btn.addEventListener('click', () => {
                // 1. ВИБРАЦИЯ (работает только в мобильном приложении Telegram)
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('medium'); 
                }
                
                // 2. ПЕРЕХОД ПО ССЫЛКЕ
                tg.openLink(url);
            });
        }

        // Применяем логику к нужным кнопкам
        activateButton('napilnik-btn', 'https://www.google.com');
        activateButton('boltik-btn', 'https://www.yandex.ru');
    </script>
</body>
</html>
