<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini App</title>

<!-- Telegram SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
font-family: Inter, sans-serif;
background:#27272a;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
margin-right:10px;
}

.green-dot{
background:#22c55e;
}

.white-dot{
background:#ffffff;
}

.custom-button{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

width:100%;
max-width:320px;

padding:16px;

border-radius:30px;

font-weight:700;
letter-spacing:1px;

transition:all .15s ease;

background:#3f3f46;
color:white;
}

.custom-button:active{
transform:scale(.92);
opacity:.8;
}

.button-group{
display:flex;
flex-direction:column;
gap:12px;
width:100%;
align-items:center;
margin-bottom:20px;
}

.status-indicator{
display:flex;
gap:10px;
margin-bottom:40px;
}

.status-dot{
width:12px;
height:12px;
border-radius:50%;
background:#22c55e;
}

.large-button{
max-width:360px;
padding:20px;
font-size:16px;
}

</style>

</head>

<body>

<main class="flex flex-col items-center px-4 py-14 w-full min-h-screen">

<!-- Status indicators -->
<div class="status-indicator">
<div class="status-dot"></div>
<div class="status-dot"></div>
<div class="status-dot"></div>
</div>

<!-- subscription buttons -->
<div class="button-group">

<button id="sub1" class="custom-button">
<div class="dot green-dot"></div>
ОПЛАТИТЬ ПОДПИСКУ
</button>

<button id="sub2" class="custom-button">
<div class="dot green-dot"></div>
ОПЛАТИТЬ ПОДПИСКУ
</button>

</div>

<!-- action buttons -->
<div class="button-group">

<button id="act1" class="custom-button">
<div class="dot white-dot"></div>
ШИЗИТЬ
</button>

<button id="act2" class="custom-button">
<div class="dot white-dot"></div>
ШИЗИТЬ
</button>

</div>

<!-- big button -->
<button id="mainBtn" class="custom-button large-button">
<div class="dot white-dot"></div>
ОПЛАТИТЬ ПОДПИСКУ
</button>

</main>

<script>

const tg = window.Telegram.WebApp;

tg.ready();
tg.expand();

function activateButton(id, url){

const btn=document.getElementById(id);

btn.addEventListener("click",()=>{

if(tg.HapticFeedback){
tg.HapticFeedback.impactOccurred("medium");
}

tg.openLink(url);

});

}

activateButton("sub1","https://google.com");
activateButton("sub2","https://google.com");

activateButton("act1","https://yandex.ru");
activateButton("act2","https://yandex.ru");

activateButton("mainBtn","https://ferrari.com");

</script>

</body>
</html>
