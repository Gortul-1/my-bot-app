<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поисковики</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container { text-align: center; width: 90%; }
        h2 { margin-bottom: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            color: white;
            text-align: center;
        }
        .google { background-color: #4285F4; }
        .yahoo { background-color: #6001d2; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выберите поисковик:</h2>
        <a href="https://www.google.com" class="btn google">Google</a>
        <a href="https://www.yahoo.com" class="btn yahoo">Yahoo</a>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на всё окно
    </script>
</body>
</html>
