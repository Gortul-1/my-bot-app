<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<title>Mini App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: manipulation;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
  background: #f6f6f6;
}

body {
  font-family: Inter, sans-serif;
  background: #f6f6f6;
  position: fixed;
  inset: 0;
}

#app {
  height: 100dvh;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  background: #f6f6f6;
  transition: height 0.22s ease;
}

#content {
  transition: min-height 0.22s ease, padding-bottom 0.22s ease;
}

* {
  box-sizing: border-box;
}

/* progress bar */

.progress-nav {
  position: relative;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  width: 100%;
  max-width: 280px;
  margin: 0 auto;
}

.progress-nav::before {
  content: '';
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  height: 2px;
  background: #dcdcdc;
  z-index: 1;
}

.progress-active-line {
  position: absolute;
  top: 14px;
  left: 14px;
  width: calc(50% - 14px);
  height: 2px;
  background: #bdbdbd;
  z-index: 1;
}

.progress-circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  box-shadow: 0 3px 5px rgba(0,0,0,0.15), inset 0 1px 2px rgba(0,0,0,0.12);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.progress-check {
  width: 10px;
  height: 6px;
  border-left: 2px solid #2b2b2b;
  border-bottom: 2px solid #2b2b2b;
  transform: rotate(-45deg);
  margin-top: -2px;
}

/* кнопка не выбрана */

.neu-button {
  border-radius: 49px;
  background: #f2f2f2;
  box-shadow: inset 2px 2px 4px rgba(0,0,0,0.12);
  transition: all 0.25s ease;
  color: #9c9c9c;
  -webkit-tap-highlight-color: transparent;
  border: none;
}

/* кнопка выбрана */

.neu-active {
  border-radius: 49px;
  background: #f5f5f5;
  box-shadow:
    0px 8px 18px rgba(0,0,0,0.30),
    0px 25px 60px rgba(0,0,0,0.20);
  transition: all 0.25s ease;
  color: #000;
  -webkit-tap-highlight-color: transparent;
  border: none;
}

.neu-active:active,
.neu-button:active {
  transform: translateY(1px);
}

.input-style {
  border-radius: 54px;
  background: #fff;
  box-shadow: inset 0px 4.9px 4.9px rgba(0,0,0,0.22), 0px 4.9px 4.9px rgba(0,0,0,0.10);
  font-size: 16px;
  outline: none;
  border: none;
}

button, input, textarea, select, a {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<body>

<div id="app">
  <div id="content" class="flex flex-col min-h-[100dvh] bg-[#f6f6f6] pt-[16px] pb-[24px]">

    <!-- progress -->
    <div class="px-8 mb-6">
      <div class="progress-nav">

        <div class="progress-active-line"></div>

        <div class="flex flex-col items-center">
          <div class="progress-circle">
            <div class="progress-check"></div>
          </div>
          <div class="text-black text-xs mt-2 font-medium">Выбор</div>
        </div>

        <div class="flex flex-col items-center">
          <div class="progress-circle">
            <div class="progress-check opacity-30"></div>
          </div>
          <div class="text-gray-400 text-xs mt-2 font-medium">Данные</div>
        </div>

        <div class="flex flex-col items-center">
          <div class="progress-circle">
            <div class="progress-check opacity-30"></div>
          </div>
          <div class="text-gray-400 text-xs mt-2 font-medium">Оплата</div>
        </div>

      </div>
    </div>

    <!-- товар -->
    <div class="flex flex-col px-[30px]">

      <div class="text-[#646464] text-base opacity-80 mb-2">
        Товар:
      </div>

      <div class="text-[24px] font-semibold text-black leading-[1.2] mb-4">
        Доступ в закрытый<br>канал “Время бояться”
      </div>

      <div class="flex items-center gap-3 bg-white rounded-[20px] p-3 shadow">
        <div class="w-[44px] h-[44px] rounded-full bg-red-800 flex-shrink-0"></div>

        <div class="flex flex-col text-sm">
          <div class="font-medium">Мета катакомбы</div>
          <div class="text-[#8d8d8d] text-xs">
            Название канала изменено на "Мета катакомбы"
          </div>
        </div>
      </div>

    </div>

    <!-- кнопки -->
    <div class="px-[30px] mt-6">

      <div class="text-[#646464] text-base opacity-80 mb-4">
        Способ оплаты
      </div>

      <div class="flex gap-[22px]">

        <button id="russian" type="button" class="w-[155px] h-[84px] neu-active flex items-center justify-center text-sm font-medium text-center leading-[1.2]">
          Российский<br>банк
        </button>

        <button id="foreign" type="button" class="w-[155px] h-[84px] neu-button flex items-center justify-center text-sm font-medium text-center leading-[1.2]">
          Зарубежный<br>банк
        </button>

      </div>

    </div>

    <!-- email -->
    <div class="px-[30px] mt-6" id="emailWrap">

      <div class="text-[#646464] text-base opacity-80 mb-3">
        Ваш E-mail для отправки чека
      </div>

      <input id="email" type="email" inputmode="email" autocomplete="email" class="w-full h-[30px] px-4 input-style"/>

    </div>

    <!-- цена -->
    <div class="px-[30px] mt-6">

      <div class="text-[#646464] text-[18px]">
        к оплате
      </div>

      <div class="text-[30px] font-bold text-[#181818]">
        1200 р
      </div>

    </div>

    <!-- кнопка далее -->
    <div class="flex items-center px-[30px] mt-6">

      <button id="nextBtn" type="button" class="flex items-center justify-center px-6 py-2 bg-[#1f1f1f] text-white text-[26px] rounded-[40px] shadow-lg">
        далее
      </button>

      <div class="h-[2px] bg-gray-300 flex-grow -mr-[30px]"></div>

    </div>

  </div>
</div>

<script>
(function () {
  "use strict";

  let selectedBank = "russian";
  let lastTouchEnd = 0;
  let focusTimer = null;
  let viewportRaf = null;
  let lastKnownScrollTop = 0;

  const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  const app = document.getElementById("app");
  const content = document.getElementById("content");
  const emailInput = document.getElementById("email");
  const russianBtn = document.getElementById("russian");
  const foreignBtn = document.getElementById("foreign");
  const nextBtn = document.getElementById("nextBtn");

  function isKeyboardOpen() {
    return document.activeElement === emailInput;
  }

  function getViewportHeight() {
    if (window.visualViewport && window.visualViewport.height) {
      return Math.round(window.visualViewport.height);
    }
    return Math.round(window.innerHeight || document.documentElement.clientHeight || 0);
  }

  function updateAppHeight(smooth) {
    const height = getViewportHeight();
    if (!height || height < 1) return;

    if (!smooth) {
      app.style.transition = "none";
      content.style.transition = "none";
    } else {
      app.style.transition = "height 0.22s ease";
      content.style.transition = "min-height 0.22s ease, padding-bottom 0.22s ease";
    }

    document.documentElement.style.height = height + "px";
    document.body.style.height = height + "px";
    app.style.height = height + "px";
    content.style.minHeight = height + "px";

    if (!smooth) {
      requestAnimationFrame(() => {
        app.style.transition = "height 0.22s ease";
        content.style.transition = "min-height 0.22s ease, padding-bottom 0.22s ease";
      });
    }
  }

  function updateBankButtons() {
    russianBtn.classList.remove("neu-active", "neu-button");
    foreignBtn.classList.remove("neu-active", "neu-button");

    if (selectedBank === "russian") {
      russianBtn.classList.add("neu-active");
      foreignBtn.classList.add("neu-button");
    } else {
      foreignBtn.classList.add("neu-active");
      russianBtn.classList.add("neu-button");
    }
  }

  function selectBank(bank) {
    if (bank !== "russian" && bank !== "foreign") return;
    if (selectedBank === bank) return;
    selectedBank = bank;
    updateBankButtons();
  }

  function sendHaptic() {
    if (!tg || !tg.HapticFeedback || typeof tg.HapticFeedback.impactOccurred !== "function") return;
    try {
      tg.HapticFeedback.impactOccurred("medium");
    } catch (e) {}
  }

  function nextStep() {
    const payload = {
      email: emailInput.value.trim(),
      bank: selectedBank
    };

    if (tg && typeof tg.sendData === "function") {
      try {
        tg.sendData(JSON.stringify(payload));
      } catch (e) {
        console.log(payload);
      }
    } else {
      console.log(payload);
    }
  }

  function rememberScroll() {
    lastKnownScrollTop = app.scrollTop;
  }

  function getVisibleBottom() {
    return getViewportHeight() - 12;
  }

  function ensureInputVisible(behavior) {
    const inputRect = emailInput.getBoundingClientRect();
    const visibleTop = 10;
    const visibleBottom = getVisibleBottom();
    const extraBottomGap = 26;

    if (inputRect.bottom > visibleBottom) {
      const delta = inputRect.bottom - visibleBottom + extraBottomGap;
      app.scrollTo({
        top: app.scrollTop + delta,
        behavior: behavior || "smooth"
      });
      return;
    }

    if (inputRect.top < visibleTop) {
      const delta = visibleTop - inputRect.top + 10;
      app.scrollTo({
        top: Math.max(0, app.scrollTop - delta),
        behavior: behavior || "smooth"
      });
    }
  }

  function scheduleEnsureVisible() {
    clearTimeout(focusTimer);
    focusTimer = setTimeout(() => {
      updateAppHeight(true);
      ensureInputVisible("smooth");
      setTimeout(() => ensureInputVisible("smooth"), 120);
      setTimeout(() => ensureInputVisible("smooth"), 260);
      setTimeout(() => ensureInputVisible("smooth"), 420);
    }, 60);
  }

  function handleFocus() {
    rememberScroll();
    updateAppHeight(true);
    scheduleEnsureVisible();
  }

  function handleBlur() {
    updateAppHeight(true);
  }

  function syncViewportSmooth() {
    if (viewportRaf) cancelAnimationFrame(viewportRaf);

    viewportRaf = requestAnimationFrame(() => {
      updateAppHeight(true);

      if (isKeyboardOpen()) {
        ensureInputVisible("auto");
      }
    });
  }

  function isInteractiveElement(target) {
    return !!(target && target.closest("input, button, textarea, select, label, a"));
  }

  function handleOutsidePointer(event) {
    if (isInteractiveElement(event.target)) {
      return;
    }

    if (document.activeElement === emailInput) {
      emailInput.blur();
    }
  }

  russianBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    selectBank("russian");
    sendHaptic();
  }, { passive: false });

  foreignBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    selectBank("foreign");
    sendHaptic();
  }, { passive: false });

  nextBtn.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    sendHaptic();
    nextStep();
  }, { passive: false });

  emailInput.addEventListener("focus", handleFocus);
  emailInput.addEventListener("blur", handleBlur);

  emailInput.addEventListener("click", function (e) {
    e.stopPropagation();
  });

  emailInput.addEventListener("touchstart", function (e) {
    e.stopPropagation();
  }, { passive: true });

  app.addEventListener("scroll", rememberScroll, { passive: true });

  document.addEventListener("click", handleOutsidePointer, { passive: true });
  document.addEventListener("touchstart", handleOutsidePointer, { passive: true });

  document.addEventListener("touchend", function (event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });

  ["gesturestart", "gesturechange", "gestureend"].forEach(function (eventName) {
    document.addEventListener(eventName, function (e) {
      e.preventDefault();
    }, { passive: false });
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", syncViewportSmooth);
    window.visualViewport.addEventListener("scroll", syncViewportSmooth);
  }

  window.addEventListener("orientationchange", function () {
    setTimeout(() => {
      updateAppHeight(true);
      if (document.activeElement === emailInput) {
        ensureInputVisible("auto");
      }
    }, 250);
  });

  window.addEventListener("resize", function () {
    updateAppHeight(true);
    if (document.activeElement === emailInput) {
      ensureInputVisible("auto");
    }
  });

  updateAppHeight(false);
  updateBankButtons();

  if (tg) {
    try {
      tg.ready();
      tg.expand();
      if (typeof tg.disableVerticalSwipes === "function") {
        tg.disableVerticalSwipes();
      }
    } catch (e) {}
  }
})();
</script>

</body>
</html>
