<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Mini App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f6f6f6;
      --card: #ffffff;
      --text: #181818;
      --muted: #7a7a7a;
      --line: #dcdcdc;
      --accent: #1f1f1f;
      --accent-dark: #111111;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.08);
      --shadow-strong: 0 14px 28px rgba(0, 0, 0, 0.16);
      --radius-xl: 24px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #app {
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      background: var(--bg);
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 16px 20px calc(24px + env(safe-area-inset-bottom));
      gap: 20px;
      max-width: 540px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topbar-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0;
    }

    .topbar-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .icon-btn {
      border: none;
      background: var(--card);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .icon-btn:active {
      transform: translateY(1px);
    }

    .progress {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 320px;
      margin: 0 auto;
      width: 100%;
    }

    .progress::before {
      content: "";
      position: absolute;
      top: 14px;
      left: 18px;
      right: 18px;
      height: 2px;
      background: var(--line);
      z-index: 1;
    }

    .progress-line {
      position: absolute;
      top: 14px;
      left: 18px;
      width: calc(50% - 18px);
      height: 2px;
      background: #bdbdbd;
      z-index: 1;
      transition: width 0.25s ease;
    }

    .step {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 88px;
      text-align: center;
    }

    .step-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 3px 5px rgba(0,0,0,0.15), inset 0 1px 2px rgba(0,0,0,0.12);
      font-size: 14px;
      font-weight: 700;
      color: #a5a5a5;
      transition: all 0.25s ease;
    }

    .step.done .step-circle {
      color: #fff;
      background: var(--accent);
    }

    .step.active .step-circle {
      color: #fff;
      background: #bdbdbd;
    }

    .step-label {
      font-size: 12px;
      color: #9a9a9a;
      font-weight: 600;
    }

    .step.active .step-label,
    .step.done .step-label {
      color: var(--text);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 18px;
    }

    .label {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .product-title {
      margin: 0 0 14px;
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
    }

    .product-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fafafa;
      border-radius: 18px;
      padding: 12px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #7f1d1d;
      flex-shrink: 0;
    }

    .product-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .product-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .bank-btn {
      min-height: 82px;
      border: none;
      border-radius: 26px;
      background: #f1f1f1;
      color: #8c8c8c;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.08);
      padding: 10px;
    }

    .bank-btn.active {
      background: #f5f5f5;
      color: var(--text);
      box-shadow:
        0px 8px 18px rgba(0,0,0,0.30),
        0px 25px 60px rgba(0,0,0,0.20);
      transform: translateY(-1px);
    }

    .bank-btn:active {
      transform: translateY(1px);
    }

    .input {
      width: 100%;
      min-height: 48px;
      border: none;
      outline: none;
      border-radius: var(--radius-pill);
      background: #fff;
      box-shadow:
        inset 0 3px 6px rgba(0,0,0,0.12),
        0 4px 8px rgba(0,0,0,0.06);
      padding: 0 16px;
      font-size: 16px;
      line-height: 16px;
      appearance: none;
      -webkit-appearance: none;
    }

    .input.error {
      box-shadow:
        inset 0 3px 6px rgba(180,0,0,0.14),
        0 0 0 2px rgba(255, 59, 48, 0.22);
    }

    .error-text {
      margin-top: 8px;
      font-size: 12px;
      color: #d70015;
      display: none;
    }

    .error-text.show {
      display: block;
    }

    .summary {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .price-label {
      font-size: 16px;
      color: var(--muted);
    }

    .price-value {
      font-size: 34px;
      font-weight: 800;
      margin-top: 4px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .continue-btn {
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-pill);
      min-height: 56px;
      padding: 0 26px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow-strong);
      transition: background 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    .continue-btn:active {
      transform: translateY(1px);
    }

    .continue-btn:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .footer-line {
      height: 2px;
      background: #d9d9d9;
      flex: 1;
      border-radius: 999px;
    }

    .hidden {
      display: none !important;
    }

    button, input, textarea, select, a, div {
      -webkit-tap-highlight-color: transparent;
    }

    @media (max-width: 420px) {
      .bank-grid {
        grid-template-columns: 1fr;
      }

      .product-title {
        font-size: 22px;
      }

      .continue-btn {
        font-size: 20px;
        width: 100%;
      }

      .footer {
        flex-direction: column;
        align-items: stretch;
      }

      .footer-line {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <header class="topbar">
        <div>
          <h1 class="topbar-title">Оплата доступа</h1>
          <p class="topbar-subtitle">Telegram Mini App interface</p>
        </div>
        <button class="icon-btn" id="closeBtn" aria-label="Закрыть">✕</button>
      </header>

      <section class="progress" aria-label="Прогресс оформления">
        <div class="progress-line" id="progressLine"></div>

        <div class="step done">
          <div class="step-circle">✓</div>
          <div class="step-label">Выбор</div>
        </div>

        <div class="step active">
          <div class="step-circle">2</div>
          <div class="step-label">Данные</div>
        </div>

        <div class="step">
          <div class="step-circle">3</div>
          <div class="step-label">Оплата</div>
        </div>
      </section>

      <section class="card">
        <div class="label">Товар</div>
        <h2 class="product-title">Доступ в закрытый канал “Время бояться”</h2>

        <div class="product-row">
          <div class="avatar"></div>
          <div>
            <div class="product-name">Мета катакомбы</div>
            <div class="product-desc">Название канала изменено на “Мета катакомбы”</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="label">Способ оплаты</div>

        <div class="bank-grid">
          <button class="bank-btn active" data-bank="russian" type="button">
            Российский<br />банк
          </button>
          <button class="bank-btn" data-bank="foreign" type="button">
            Зарубежный<br />банк
          </button>
        </div>
      </section>

      <section class="card" id="emailBlock">
        <div class="label">Ваш E-mail для отправки чека</div>
        <input
          id="email"
          class="input"
          type="email"
          inputmode="email"
          autocomplete="email"
          placeholder="name@example.com"
        />
        <div class="error-text" id="emailError">Введите корректный e-mail.</div>
      </section>

      <section class="card summary">
        <div>
          <div class="price-label">К оплате</div>
          <div class="price-value">1200 ₽</div>
        </div>
        <div class="status" id="statusText">Готово к отправке</div>
      </section>

      <footer class="footer">
        <button class="continue-btn" id="nextBtn" type="button">далее</button>
        <div class="footer-line"></div>
      </footer>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    const state = {
      bank: "russian",
      email: ""
    };

    const elements = {
      app: document.getElementById("app"),
      email: document.getElementById("email"),
      emailBlock: document.getElementById("emailBlock"),
      emailError: document.getElementById("emailError"),
      nextBtn: document.getElementById("nextBtn"),
      closeBtn: document.getElementById("closeBtn"),
      statusText: document.getElementById("statusText"),
      bankButtons: Array.from(document.querySelectorAll(".bank-btn"))
    };

    let lastTouchEnd = 0;

    function setStatus(text) {
      elements.statusText.textContent = text;
    }

    function updateBankButtons() {
      elements.bankButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.bank === state.bank);
      });
    }

    function validateEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim());
    }

    function showEmailError(show) {
      elements.email.classList.toggle("error", show);
      elements.emailError.classList.toggle("show", show);
    }

    function blurActiveElement() {
      const active = document.activeElement;
      if (active && typeof active.blur === "function") {
        active.blur();
      }
    }

    function scrollInputIntoView() {
      setTimeout(() => {
        elements.emailBlock.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }, 250);
    }

    function selectBank(bank) {
      state.bank = bank;
      updateBankButtons();
      setStatus("Готово к отправке");
    }

    function nextStep() {
      const email = elements.email.value.trim();
      state.email = email;

      if (!validateEmail(email)) {
        showEmailError(true);
        elements.email.focus();
        scrollInputIntoView();
        setStatus("Проверьте e-mail");
        return;
      }

      showEmailError(false);
      elements.nextBtn.disabled = true;
      setStatus("Отправка данных...");

      const payload = {
        email: state.email,
        bank: state.bank
      };

      try {
        if (tg && typeof tg.sendData === "function") {
          tg.sendData(JSON.stringify(payload));
          setStatus("Данные отправлены");
        } else {
          console.log("Telegram payload:", payload);
          setStatus("Данные готовы");
        }
      } catch (error) {
        console.error("Send error:", error);
        setStatus("Не удалось отправить данные");
      } finally {
        setTimeout(() => {
          elements.nextBtn.disabled = false;
        }, 250);
      }
    }

    function attachEvents() {
      elements.bankButtons.forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          selectBank(btn.dataset.bank);
        });
      });

      elements.email.addEventListener("focus", scrollInputIntoView);

      elements.email.addEventListener("input", () => {
        const value = elements.email.value.trim();

        if (value === "") {
          showEmailError(false);
          setStatus("Готово к отправке");
          return;
        }

        if (validateEmail(value)) {
          showEmailError(false);
          setStatus("E-mail корректный");
        }
      });

      elements.email.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      elements.email.addEventListener("touchstart", (event) => {
        event.stopPropagation();
      }, { passive: true });

      elements.nextBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        nextStep();
      });

      elements.closeBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();

        blurActiveElement();

        try {
          if (tg && typeof tg.close === "function") {
            tg.close();
          } else {
            window.close();
          }
        } catch (error) {
          console.error("Close error:", error);
        }
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest("input, button, textarea, select, label")) {
          blurActiveElement();
        }
      });

      document.addEventListener("touchstart", (event) => {
        if (!event.target.closest("input, button, textarea, select, label")) {
          blurActiveElement();
        }
      }, { passive: true });

      document.addEventListener("touchend", (event) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });

      ["gesturestart", "gesturechange", "gestureend"].forEach((eventName) => {
        document.addEventListener(eventName, (event) => {
          event.preventDefault();
        }, { passive: false });
      });

      if (window.visualViewport) {
        const handleViewport = () => {
          const viewportHeight = window.visualViewport.height;
          elements.app.style.height = viewportHeight + "px";
        };

        window.visualViewport.addEventListener("resize", handleViewport);
        window.visualViewport.addEventListener("scroll", handleViewport);
        handleViewport();
      }
    }

    function initTelegram() {
      try {
        if (!tg) {
          setStatus("Режим предпросмотра");
          return;
        }

        tg.ready();
        tg.expand();

        if (typeof tg.disableVerticalSwipes === "function") {
          tg.disableVerticalSwipes();
        }

        setStatus("Готово к отправке");
      } catch (error) {
        console.error("Telegram init error:", error);
        setStatus("Ошибка инициализации");
      }
    }

    updateBankButtons();
    attachEvents();
    initTelegram();
  </script>
</body>
</html>
