<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#f6f6f6;
touch-action: manipulation;
}

/* progress bar */

.progress-nav{
position:relative;
display:flex;
justify-content:space-between;
align-items:flex-start;
width:100%;
max-width:280px;
margin:0 auto;
}

.progress-nav::before{
content:'';
position:absolute;
top:14px;
left:14px;
right:14px;
height:2px;
background:#dcdcdc;
z-index:1;
}

.progress-active-line{
position:absolute;
top:14px;
left:14px;
width:calc(50% - 14px);
height:2px;
background:#bdbdbd;
z-index:1;
}

.progress-circle{
width:28px;
height:28px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:white;
box-shadow:0 3px 5px rgba(0,0,0,0.15), inset 0 1px 2px rgba(0,0,0,0.12);
flex-shrink:0;
position:relative;
z-index:2;
}

.progress-check{
width:10px;
height:6px;
border-left:2px solid #2b2b2b;
border-bottom:2px solid #2b2b2b;
transform:rotate(-45deg);
margin-top:-2px;
}

/* кнопка не выбрана */

.neu-button{
border-radius:49px;
background:#f2f2f2;
box-shadow: inset 2px 2px 4px rgba(0,0,0,0.12);
transition: all 0.25s ease;
color:#9c9c9c;
}

/* кнопка выбрана */

.neu-active{
border-radius:49px;
background:#f5f5f5;

box-shadow:
0px 8px 18px rgba(0,0,0,0.30),
0px 25px 60px rgba(0,0,0,0.20);

transition: all 0.25s ease;
color:#000;
}

.neu-active:active{
transform:translateY(1px);
}

.input-style{
border-radius:54px;
background:#fff;
box-shadow:inset 0px 4.9px 4.9px rgba(0,0,0,0.22),0px 4.9px 4.9px rgba(0,0,0,0.10);
}

</style>
</head>

<body>

<div class="flex flex-col h-screen bg-[#f6f6f6] pt-[16px]">

<!-- progress -->

<div class="px-8 mb-6">
<div class="progress-nav">

<div class="progress-active-line"></div>

<div class="flex flex-col items-center">
<div class="progress-circle">
<div class="progress-check"></div>
</div>
<div class="text-black text-xs mt-2 font-medium">Выбор</div>
</div>

<div class="flex flex-col items-center">
<div class="progress-circle">
<div class="progress-check opacity-30"></div>
</div>
<div class="text-gray-400 text-xs mt-2 font-medium">Данные</div>
</div>

<div class="flex flex-col items-center">
<div class="progress-circle">
<div class="progress-check opacity-30"></div>
</div>
<div class="text-gray-400 text-xs mt-2 font-medium">Оплата</div>
</div>

</div>
</div>

<!-- товар -->

<div class="flex flex-col px-[30px]">

<div class="text-[#646464] text-base opacity-80 mb-2">
Товар:
</div>

<div class="text-[24px] font-semibold text-black leading-[1.2] mb-4">
Доступ в закрытый<br>канал “Время бояться”
</div>

<div class="flex items-center gap-3 bg-white rounded-[20px] p-3 shadow">

<div class="w-[44px] h-[44px] rounded-full bg-red-800 flex-shrink-0"></div>

<div class="flex flex-col text-sm">
<div class="font-medium">Мета катакомбы</div>
<div class="text-[#8d8d8d] text-xs">
Название канала изменено на "Мета катакомбы"
</div>
</div>

</div>

</div>

<!-- кнопки -->

<div class="px-[30px] mt-6">

<div class="text-[#646464] text-base opacity-80 mb-4">
Способ оплаты
</div>

<div class="flex gap-[22px]">

<button id="russian" onclick="selectBank('russian')" class="w-[155px] h-[84px] neu-active flex items-center justify-center text-sm font-medium text-center leading-[1.2]">
Российский<br>банк
</button>

<button id="foreign" onclick="selectBank('foreign')" class="w-[155px] h-[84px] neu-button flex items-center justify-center text-sm font-medium text-center leading-[1.2]">
Зарубежный<br>банк
</button>

</div>

</div>

<!-- email -->

<div class="px-[30px] mt-6">

<div class="text-[#646464] text-base opacity-80 mb-3">
Ваш E-mail для отправки чека
</div>

<input id="email" type="email" class="w-full h-[30px] px-4 input-style"/>

</div>

<!-- цена -->

<div class="px-[30px] mt-6">

<div class="text-[#646464] text-[18px]">
к оплате
</div>

<div class="text-[30px] font-bold text-[#181818]">
1200 р
</div>

</div>

<!-- кнопка далее -->

<div class="flex items-center px-[30px] mt-6">

<button onclick="nextStep()" class="flex items-center justify-center px-6 py-2 bg-[#1f1f1f] text-white text-[26px] rounded-[40px] shadow-lg">
далее
</button>

<div class="h-[2px] bg-gray-300 flex-grow -mr-[30px]"></div>

</div>

</div>

<script>

let selectedBank="russian";

function selectBank(bank){

selectedBank=bank;

const russian=document.getElementById("russian");
const foreign=document.getElementById("foreign");

russian.classList.remove("neu-active");
foreign.classList.remove("neu-active");

russian.classList.add("neu-button");
foreign.classList.add("neu-button");

if(bank==="russian"){
russian.classList.add("neu-active");
russian.classList.remove("neu-button");
}else{
foreign.classList.add("neu-active");
foreign.classList.remove("neu-button");
}

}

function nextStep(){

const email=document.getElementById("email").value;

Telegram.WebApp.sendData(JSON.stringify({
email:email,
bank:selectedBank
}));

}

Telegram.WebApp.ready();
Telegram.WebApp.expand();

</script>

</body>
</html>
