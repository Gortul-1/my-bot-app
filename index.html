<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #f6f6f6;
            overflow-x: hidden;
        }

        /* progress bar styles */
        .progress-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15), inset 0 1px 2px rgba(0,0,0,0.12);
            position: relative;
            z-index: 10;
        }

        .progress-check {
            width: 10px;
            height: 6px;
            border-left: 2px solid #2b2b2b;
            border-bottom: 2px solid #2b2b2b;
            transform: rotate(-45deg);
            margin-top: -2px;
        }

        /* bank buttons */
        .neu-button {
            border-radius: 49px;
            background: linear-gradient(99deg, #f7f7f7 0%, #f2f2f2 100%);
            box-shadow: inset 0px 4px 4px rgba(0,0,0,0.18), 0px 3px 6px rgba(0,0,0,0.08);
        }

        .neu-active {
            border-radius: 49px;
            background: linear-gradient(270deg, #928e8e 0%, #000 100%);
            box-shadow: 0 8px 14px rgba(0,0,0,0.18), 0 2px 4px rgba(0,0,0,0.12), inset 0 1px 2px rgba(255,255,255,0.15);
        }

        /* input */
        .input-style {
            border-radius: 54px;
            background: #fff;
            box-shadow: inset 0px 4.9px 4.9px rgba(0,0,0,0.22), 0px 4.9px 4.9px rgba(0,0,0,0.10);
            outline: none;
        }
    </style>
</head>

<body>

<div class="flex flex-col h-screen bg-[#f6f6f6] pt-[20px]">

    <!-- progress bar (центрированный) -->
    <div class="px-10 mb-8 relative">
        <!-- Фоновые линии -->
        <div class="absolute top-[14px] left-10 right-10 h-[2px] bg-[#dcdcdc] z-0">
            <!-- Активная часть линии (прогресс) -->
            <div id="progress-line" class="h-full bg-[#bdbdbd] transition-all duration-300" style="width: 50%;"></div>
        </div>

        <div class="flex justify-between items-start relative z-10">
            <!-- Шаг 1 -->
            <div class="flex flex-col items-center w-16">
                <div class="progress-circle mb-2">
                    <div class="progress-check"></div>
                </div>
                <div class="text-xs font-medium text-black">Выбор</div>
            </div>

            <!-- Шаг 2 -->
            <div class="flex flex-col items-center w-16">
                <div class="progress-circle mb-2">
                    <div class="progress-check opacity-30"></div>
                </div>
                <div class="text-xs font-medium text-gray-400">Данные</div>
            </div>

            <!-- Шаг 3 -->
            <div class="flex flex-col items-center w-16">
                <div class="progress-circle mb-2">
                    <div class="progress-check opacity-30"></div>
                </div>
                <div class="text-xs font-medium text-gray-400">Оплата</div>
            </div>
        </div>
    </div>

    <!-- товар -->
    <div class="flex flex-col px-[30px]">
        <div class="text-[#646464] text-base opacity-80 mb-2">Товар:</div>
        <div class="text-[24px] font-semibold text-black leading-[1.2] mb-4">
            Доступ в закрытый<br>канал “Время бояться”
        </div>

        <div class="flex items-center gap-3 bg-white rounded-[20px] p-3 shadow-sm border border-gray-100">
            <div class="w-[44px] h-[44px] rounded-full bg-red-800 flex-shrink-0"></div>
            <div class="flex flex-col text-sm">
                <div class="font-medium">Мета катакомбы</div>
                <div class="text-[#8d8d8d] text-xs">Название канала изменено на "Мета катакомбы"</div>
            </div>
        </div>
    </div>

    <!-- способ оплаты -->
    <div class="px-[30px] mt-8">
        <div class="text-[#646464] text-base opacity-80 mb-4">Способ оплаты</div>
        <div class="flex gap-4">
            <button id="russian" onclick="selectBank('russian')" class="relative flex-1 h-[84px] neu-active flex items-center justify-center transition-all">
                <div class="absolute inset-[3px] flex items-center justify-center rounded-[45px] bg-gradient-to-r from-[#f7f7f7] to-[#f2f2f2] inner-content">
                    <div class="text-[#353535] text-sm text-center leading-[1.2] font-semibold">Российский<br>банк</div>
                </div>
            </button>

            <button id="foreign" onclick="selectBank('foreign')" class="relative flex-1 h-[84px] neu-button flex items-center justify-center transition-all">
                <div class="text-[#bab8b8] text-sm text-center leading-[1.2] font-semibold label-text">Зарубежный<br>банк</div>
            </button>
        </div>
    </div>

    <!-- email -->
    <div class="px-[30px] mt-8">
        <div class="text-[#646464] text-base opacity-80 mb-3">Ваш E-mail для отправки чека</div>
        <input id="email" type="email" placeholder="example@mail.com" class="w-full h-[40px] px-5 input-style text-sm" />
    </div>

    <!-- цена и кнопка -->
    <div class="mt-auto pb-10 px-[30px]">
        <div class="flex justify-between items-end mb-6">
            <div class="flex flex-col">
                <div class="text-[#646464] text-sm uppercase tracking-wider">к оплате</div>
                <div class="text-[32px] font-bold text-[#181818]">1200 р</div>
            </div>
            
            <div class="flex items-center gap-4 flex-1 justify-end">
                <div class="h-[2px] bg-gray-300 w-12"></div>
                <button onclick="nextStep()" class="flex items-center justify-center px-8 py-3 bg-[#1f1f1f] text-white text-[22px] font-medium rounded-[40px] shadow-xl active:scale-95 transition-transform">
                    далее
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    let selectedBank = "russian";

    function selectBank(bank) {
        selectedBank = bank;
        const russian = document.getElementById("russian");
        const foreign = document.getElementById("foreign");

        // Сброс классов
        russian.className = "relative flex-1 h-[84px] flex items-center justify-center transition-all";
        foreign.className = "relative flex-1 h-[84px] flex items-center justify-center transition-all";

        if (bank === "russian") {
            russian.classList.add("neu-active");
            foreign.classList.add("neu-button");
            
            // Внутренний контент для активной кнопки РФ
            russian.innerHTML = `<div class="absolute inset-[3px] flex items-center justify-center rounded-[45px] bg-gradient-to-r from-[#f7f7f7] to-[#f2f2f2]"><div class="text-[#353535] text-sm text-center leading-[1.2] font-semibold">Российский<br>банк</div></div>`;
            foreign.innerHTML = `<div class="text-[#bab8b8] text-sm text-center leading-[1.2] font-semibold">Зарубежный<br>банк</div>`;
        } else {
            foreign.classList.add("neu-active");
            russian.classList.add("neu-button");
            
            // Внутренний контент для активной кнопки Зарубеж
            foreign.innerHTML = `<div class="absolute inset-[3px] flex items-center justify-center rounded-[45px] bg-gradient-to-r from-[#f7f7f7] to-[#f2f2f2]"><div class="text-[#353535] text-sm text-center leading-[1.2] font-semibold">Зарубежный<br>банк</div></div>`;
            russian.innerHTML = `<div class="text-[#bab8b8] text-sm text-center leading-[1.2] font-semibold">Российский<br>банк</div>`;
        }
    }

    function nextStep() {
        const email = document.getElementById("email").value;
        if (!email) {
            Telegram.WebApp.showAlert("Пожалуйста, введите E-mail");
            return;
        }
        Telegram.WebApp.sendData(JSON.stringify({
            email: email,
            bank: selectedBank
        }));
    }

    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
</script>

</body>
</html>
